name: Release

on:
  push:
    branches:
      - prod

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'mod.version' stonecutter.properties.toml | head -n 1 | cut -d'=' -f2 | tr -d '" ' )
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check Tag Exists
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q "refs/tags/"; then
            echo "Error: Tag v${{ steps.version.outputs.version }} already exists. Did you forget to bump the version in stonecutter.properties.toml?"
            exit 1
          fi

      - name: Parse Changelog
        id: changelog
        run: |
          TITLE=$(head -n 1 CHANGELOG.md | sed 's/^# //' | tr -d '\r')
          BODY=$(tail -n +2 CHANGELOG.md | tr -d '\r')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

          # Maintain standard multi-line for the current job
          DELIMITER=$(openssl rand -hex 8)
          echo "body<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Build and Publish
        run: |
          chmod +x gradlew
          # Build all primary versions
          ./gradlew buildPrimary
          # Publish all primary version subprojects to Modrinth. 
          ./gradlew publishModrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.changelog.outputs.title }}
          body: ${{ steps.changelog.outputs.body }}
          files: build/libs/rfu-${{ steps.version.outputs.version }}+*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Announcement
        continue-on-error: true
        env:
          RFU_API_TOKEN: ${{ secrets.RFU_API_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TITLE: ${{ steps.changelog.outputs.title }}
          BODY: ${{ steps.changelog.outputs.body }}
        run: |
          # Calculate expiresAt (2 days from now) in milliseconds
          EXPIRES_AT=$(( $(date +%s) + 172800 ))000
          
          # Prepare the payload using jq for safe JSON construction
          JSON_PAYLOAD=$(jq -n \
            --arg content "$BODY" \
            --arg expiresAt "$EXPIRES_AT" \
            --arg message "§f§lV$VERSION Patch Notes: {§a§l[Open]}" \
            --arg title "$TITLE" \
            '{content: $content, expiresAt: ($expiresAt | tonumber), message: $message, title: $title}')

          curl --fail -X POST https://rfu.glitchdev.cloud/api/announcement \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RFU_API_TOKEN" \
            -d "$JSON_PAYLOAD"

      - name: Discord Announcement
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
          TITLE: ${{ steps.changelog.outputs.title }}
          BODY: ${{ steps.changelog.outputs.body }}
        shell: python
        run: |
          import os, sys, json, urllib.request, time

          webhook_url = os.environ.get("DISCORD_WEBHOOK")
          role_id = os.environ.get("DISCORD_ROLE_ID", "").strip()
          title = os.environ.get("TITLE", "").strip()
          body = os.environ.get("BODY", "")

          if not webhook_url:
              print("No webhook URL provided. Skipping Discord announcement.")
              sys.exit(0)

          # Format initial message
          ping = f"<@&{role_id}>\n" if role_id and role_id != "***" else ""
          header = f"# {title}\n" if title else ""
          full_content = ping + header + body

          # Split content into chunks of at most 1950 characters
          chunks = []
          current_chunk = ""
          for line in full_content.splitlines(keepends=True):
              while len(line) > 1950:
                  part = line[:1950]
                  line = line[1950:]
                  if len(current_chunk) + len(part) > 1950:
                      if current_chunk:
                          chunks.append(current_chunk)
                      current_chunk = part
                  else:
                      current_chunk += part
              
              if len(current_chunk) + len(line) > 1950:
                  if current_chunk:
                      chunks.append(current_chunk)
                  current_chunk = line
              else:
                  current_chunk += line

          if current_chunk:
              chunks.append(current_chunk)

          # Send each chunk to the webhook
          for i, chunk in enumerate(chunks):
              if i > 0:
                  time.sleep(1)
              payload = {"content": chunk.strip()}
              req = urllib.request.Request(
                  webhook_url,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json", "User-Agent": "Mozilla/5.0"}
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      print(f"Sent chunk {i+1}/{len(chunks)} successfully. Status: {response.status}")
              except Exception as e:
                  print(f"Error sending chunk {i+1}: {e}")
                  sys.exit(1)
