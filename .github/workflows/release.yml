name: Release

on:
  push:
    branches:
      - prod

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'mod.version' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Parse Changelog
        id: changelog
        run: |
          TITLE=$(head -n 1 CHANGELOG.md | sed 's/^# //')
          BODY=$(tail -n +2 CHANGELOG.md)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          # Use a delimiter for multi-line body
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and Publish
        run: |
          chmod +x gradlew
          # Build all versions first
          ./gradlew build
          # Publish all version subprojects to Modrinth. 
          # The 'modrinth' task is disabled for root and processor in build.gradle.kts.
          ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.changelog.outputs.title }}
          body: ${{ steps.changelog.outputs.body }}
          files: build/libs/rfu-${{ steps.version.outputs.version }}+*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Announcement
        env:
          RFU_API_TOKEN: ${{ secrets.RFU_API_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TITLE: ${{ steps.changelog.outputs.title }}
          BODY: ${{ steps.changelog.outputs.body }}
        run: |
          # Calculate expiresAt (2 days from now) in milliseconds
          EXPIRES_AT=$(date -d "+2 days" +%s%3N)
          
          # Prepare the payload using jq for safe JSON construction
          JSON_PAYLOAD=$(jq -n \
            --arg content "$BODY" \
            --arg expiresAt "$EXPIRES_AT" \
            --arg message "§f§lV$VERSION Patch Notes: {§a§l[Open]}" \
            --arg title "$TITLE" \
            '{content: $content, expiresAt: ($expiresAt | tonumber), message: $message, title: $title}')

          curl -X POST https://rfu.glitchdev.cloud/api/announcement \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RFU_API_TOKEN" \
            -d "$JSON_PAYLOAD"
