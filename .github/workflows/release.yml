name: Release

on:
  push:
    branches:
      - prod

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'mod.version' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Parse Changelog
        id: changelog
        run: |
          TITLE=$(head -n 1 CHANGELOG.md | sed 's/^# //')
          BODY=$(tail -n +2 CHANGELOG.md)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          # Use a delimiter for multi-line body
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and Publish
        run: |
          chmod +x gradlew
          # Build all versions first
          ./gradlew build
          # Publish all version subprojects to Modrinth. 
          # The 'modrinth' task is disabled for root and processor in build.gradle.kts.
          ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.changelog.outputs.title }}
          body: ${{ steps.changelog.outputs.body }}
          files: build/libs/rfu-${{ steps.version.outputs.version }}+*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
