name: Release

on:
  push:
    branches:
      - prod

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      title: ${{ steps.changelog.outputs.title }}
      body: ${{ steps.changelog.outputs.body }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'mod.version' stonecutter.properties.toml | head -n 1 | cut -d'=' -f2 | tr -d '" ' )
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check Tag Exists
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q "refs/tags/"; then
            echo "Error: Tag v${{ steps.version.outputs.version }} already exists. Did you forget to bump the version in stonecutter.properties.toml?"
            exit 1
          fi

      - name: Parse Changelog
        id: changelog
        run: |
          TITLE=$(head -n 1 CHANGELOG.md | sed 's/^# //')
          BODY=$(tail -n +2 CHANGELOG.md)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          
          DELIMITER=$(openssl rand -hex 8)
          echo "body<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Build and Publish
        run: |
          chmod +x gradlew
          # Build all primary versions
          ./gradlew buildPrimary
          # Publish all primary version subprojects to Modrinth. 
          ./gradlew publishModrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.changelog.outputs.title }}
          body: ${{ steps.changelog.outputs.body }}
          files: build/libs/rfu-${{ steps.version.outputs.version }}+*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  announce:
    needs: build_and_publish
    runs-on: ubuntu-latest
    steps:
      - name: Post Announcement
        env:
          RFU_API_TOKEN: ${{ secrets.RFU_API_TOKEN }}
          VERSION: ${{ needs.build_and_publish.outputs.version }}
          TITLE: ${{ needs.build_and_publish.outputs.title }}
          BODY: ${{ needs.build_and_publish.outputs.body }}
        run: |
          # Calculate expiresAt (2 days from now) in milliseconds
          EXPIRES_AT=$(date -d "+2 days" +%s%3N)
          
          # Prepare the payload using jq for safe JSON construction
          JSON_PAYLOAD=$(jq -n \
            --arg content "$BODY" \
            --arg expiresAt "$EXPIRES_AT" \
            --arg message "§f§lV$VERSION Patch Notes: {§a§l[Open]}" \
            --arg title "$TITLE" \
            '{content: $content, expiresAt: ($expiresAt | tonumber), message: $message, title: $title}')

          curl --fail -X POST https://rfu.glitchdev.cloud/api/announcement \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RFU_API_TOKEN" \
            -d "$JSON_PAYLOAD"

      - name: Discord Announcement
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_ROLE_ID: ${{ secrets.DISCORD_ROLE_ID }}
          TITLE: ${{ needs.build_and_publish.outputs.title }}
          BODY: ${{ needs.build_and_publish.outputs.body }}
        run: |
          # Combine role ping, title, and body
          MESSAGE="<@&$DISCORD_ROLE_ID>
          # $TITLE
          $BODY"

          # Prepare the payload using jq
          JSON_PAYLOAD=$(jq -n --arg content "$MESSAGE" '{content: $content}')

          curl --fail -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD"